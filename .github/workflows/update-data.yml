name: Обновить данные с Shikimori

on:
  workflow_dispatch:        # ручной запуск кнопкой
  schedule:
    - cron: '0 3 * * 1'     # каждый понедельник 03:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Собрать данные с Shikimori
        run: node scripts/fetch-data.mjs

      - name: Закоммитить данные
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Обновление данных Shikimori"
          git push
